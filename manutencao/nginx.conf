server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.html;

    # Static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public";
    }

    # HTML - no cache (always fresh)
    location ~* \.html$ {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # API - Manutencoes Actions (iniciar/concluir/pausar/cancelar)
    location ~ ^/api/v1/manutencoes/[^/]+/(iniciar|concluir|pausar|cancelar) {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/api/v1/manutencoes-actions.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param DOCUMENT_ROOT /var/www/html;
    }

    # API - Manutencoes CRUD
    location ~ ^/api/v1/manutencoes {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/api/v1/manutencoes.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param DOCUMENT_ROOT /var/www/html;
    }

    # API - Other resources (usuarios, maquinas, responsaveis, pecas, etc)
    location ~ ^/api/v1/ {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/api/v1/crud.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param DOCUMENT_ROOT /var/www/html;
    }

    # Frontend SPA
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }
}
